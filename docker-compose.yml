services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workstream
      POSTGRES_USER: workstream
      POSTGRES_PASSWORD: workstream
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workstream -d workstream"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - workstream_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7@sha256:b2b95679e3b46fb51864949ed25ea976fc3a6bcc00a40a1bc00d568cb2822e50
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workstream_postgres_data:
