name: Week 1 API Demo UI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-demo-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: demos/week1_api_demo_ui/package-lock.json

      - name: Install demo UI
        working-directory: demos/week1_api_demo_ui
        run: npm ci

      - name: Build demo UI
        working-directory: demos/week1_api_demo_ui
        run: npm run build
