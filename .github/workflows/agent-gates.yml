name: Agent Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  agent-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Static agent sensor advisory
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 scripts/workstream_agent_gate.py --base "origin/${BASE_REF}" --head HEAD --format markdown

      - name: Markdown link check
        run: python3 scripts/check_markdown_links.py

      - name: Stale wording check
        run: python3 scripts/check_stale_workstream_wording.py

      - name: Stale authorization documentation check
        run: python3 scripts/check_stale_authorization_docs.py

      - name: Stale artifact contract check
        run: python3 scripts/check_stale_artifact_contracts.py

      - name: Agent gate regression tests
        run: python3 scripts/test_agent_gates.py

      - name: Internal review evidence gate
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/check_internal_review_evidence.py
