name: Backend

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_DB: workstream_test
          POSTGRES_USER: workstream
          POSTGRES_PASSWORD: workstream
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workstream -d workstream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Internal review evidence gate
        run: python3 scripts/check_internal_review_evidence.py

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check app tests scripts

      - name: Docstring coverage
        working-directory: backend
        run: docstr-coverage --config .docstr.yaml

      - name: Isolated database runner test
        working-directory: backend
        env:
          WORKSTREAM_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/postgres
        run: python -m pytest -q tests/test_isolated_database_runner.py

      - name: Backend full-suite coverage
        working-directory: backend
        env:
          WORKSTREAM_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/postgres
        run: |
          metadata_dir="$(mktemp -d)"
          trap 'rm -rf "$metadata_dir"' EXIT
          python scripts/run_isolated_tests.py --metadata-json "$metadata_dir/result.json" --timeout-seconds 12600 -- python -m pytest -q --ignore=tests/test_isolated_database_runner.py --cov=app --cov-report=term-missing --cov-fail-under=78

      - name: Artifact foundation coverage
        working-directory: backend
        run: >-
          coverage report
          --include='app/adapters/artifacts/*,app/core/cancellation.py,app/interfaces/artifacts.py,app/modules/artifacts/*'
          --precision=2
          --fail-under=90

      - name: External service adapter coverage
        working-directory: backend
        run: >-
          coverage report
          --include='app/interfaces/external_services.py'
          --precision=2
          --fail-under=90

      - name: Artifact preparation configuration coverage
        working-directory: backend
        run: >-
          coverage report
          --include='app/core/config.py'
          --precision=2
          --fail-under=90

      - name: API contract real API e2e
        working-directory: backend
        env:
          WORKSTREAM_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/workstream_test
        run: python scripts/api_contract_e2e.py
