name: Backend

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  MINIO_IMAGE: quay.io/minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tree_sha: ${{ steps.identity.outputs.tree_sha }}

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_DB: workstream_test
          POSTGRES_USER: workstream
          POSTGRES_PASSWORD: workstream
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workstream -d workstream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - id: identity
        name: Bind checked-out tree
        shell: bash
        run: |
          set -euo pipefail
          tree_sha=$(git rev-parse HEAD)
          if [[ ! "${tree_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            exit 1
          fi
          echo "tree_sha=${tree_sha}" >> "${GITHUB_OUTPUT}"

      - name: Internal review evidence gate
        run: python3 scripts/check_internal_review_evidence.py

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check app tests scripts

      - name: Docstring coverage
        working-directory: backend
        run: docstr-coverage --config .docstr.yaml

      - name: Isolated database runner test
        working-directory: backend
        env:
          WORKSTREAM_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/postgres
        run: python -m pytest -q tests/test_isolated_database_runner.py

      - name: Collect and plan exact test inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/plan
          python3 backend/scripts/ci_test_shards.py plan \
            --repository-root . \
            --tree-sha "${{ steps.identity.outputs.tree_sha }}" \
            --shards 4 \
            --output .ci/plan/shard-manifest.json

      - name: Upload immutable shard plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-shard-plan-${{ steps.identity.outputs.tree_sha }}
          path: .ci/plan/shard-manifest.json
          if-no-files-found: error
          retention-days: 7

  shards:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_DB: workstream_test
          POSTGRES_USER: workstream
          POSTGRES_PASSWORD: workstream
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workstream -d workstream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Download exact shard plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-shard-plan-${{ needs.preflight.outputs.tree_sha }}
          path: .ci/plan

      - name: Start real MinIO artifact provider
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --rm --name workstream-minio \
            --publish 127.0.0.1:9000:9000 \
            --env MINIO_ROOT_USER=workstream-minio \
            --env MINIO_ROOT_PASSWORD=workstream-minio-secret-key \
            "${MINIO_IMAGE}" server /data --address :9000
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs workstream-minio
          exit 1

      - name: Run isolated shard ${{ matrix.shard }}
        env:
          WORKSTREAM_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/postgres
          WORKSTREAM_TEST_MINIO_ENDPOINT: http://127.0.0.1:9000
        run: >-
          python3 backend/scripts/ci_test_shards.py run-shard
          --repository-root .
          --manifest .ci/plan/shard-manifest.json
          --shard ${{ matrix.shard }}
          --bundle-dir .ci/shard-bundle
          --database-metadata "${RUNNER_TEMP}/database-${{ matrix.shard }}.json"

      - name: Upload authenticated shard ${{ matrix.shard }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-coverage-${{ needs.preflight.outputs.tree_sha }}-${{ matrix.shard }}
          path: .ci/shard-bundle
          if-no-files-found: error
          retention-days: 7

  api_e2e:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_DB: workstream_test
          POSTGRES_USER: workstream
          POSTGRES_PASSWORD: workstream
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workstream -d workstream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify checked-out tree
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ needs.preflight.outputs.tree_sha }}"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: API contract real API e2e
        working-directory: backend
        env:
          WORKSTREAM_TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://workstream:workstream@localhost:5433/postgres
        run: >-
          python scripts/run_isolated_tests.py
          --metadata-json "${RUNNER_TEMP}/api-database.json"
          --timeout-seconds 1500
          -- python scripts/api_contract_e2e.py

  test:
    if: ${{ always() }}
    needs: [preflight, shards, api_e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Require every upstream proof
        env:
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          SHARDS_RESULT: ${{ needs.shards.result }}
          API_E2E_RESULT: ${{ needs.api_e2e.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "${PREFLIGHT_RESULT}" = success
          test "${SHARDS_RESULT}" = success
          test "${API_E2E_RESULT}" = success

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Download exact shard plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-shard-plan-${{ needs.preflight.outputs.tree_sha }}
          path: .ci/plan

      - name: Download shard 1
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-coverage-${{ needs.preflight.outputs.tree_sha }}-1
          path: .ci/bundles/shard-1

      - name: Download shard 2
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-coverage-${{ needs.preflight.outputs.tree_sha }}-2
          path: .ci/bundles/shard-2

      - name: Download shard 3
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-coverage-${{ needs.preflight.outputs.tree_sha }}-3
          path: .ci/bundles/shard-3

      - name: Download shard 4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: backend-coverage-${{ needs.preflight.outputs.tree_sha }}-4
          path: .ci/bundles/shard-4

      - name: Validate exact fan-in and combine coverage
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ needs.preflight.outputs.tree_sha }}"
          python3 backend/scripts/ci_test_shards.py fan-in \
            --manifest .ci/plan/shard-manifest.json \
            --tree-sha "${{ needs.preflight.outputs.tree_sha }}" \
            --bundles-root .ci/bundles \
            --output-dir .ci/combined-coverage \
            --summary-output .ci/fan-in-summary.json
          python3 -m json.tool .ci/fan-in-summary.json
          cd backend
          coverage combine ../.ci/combined-coverage

      - name: Upload authenticated timing and balance report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-fan-in-${{ needs.preflight.outputs.tree_sha }}
          path: .ci/fan-in-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Backend full-suite coverage
        working-directory: backend
        run: coverage report --precision=2 --fail-under=78

      - name: Artifact foundation coverage
        working-directory: backend
        run: >-
          coverage report
          --include='app/adapters/artifacts/*,app/core/cancellation.py,app/core/file_locks.py,app/interfaces/artifact_operations.py,app/interfaces/artifacts.py,app/modules/artifacts/*'
          --precision=2
          --fail-under=90

      - name: External service adapter coverage
        working-directory: backend
        run: coverage report --include='app/interfaces/external_services.py' --precision=2 --fail-under=90

      - name: Artifact preparation configuration coverage
        working-directory: backend
        run: coverage report --include='app/core/config.py' --precision=2 --fail-under=90

      - name: Artifact worker wiring coverage
        working-directory: backend
        run: coverage report --include='app/workers/*' --precision=2 --fail-under=90

      - name: FastAPI startup wiring coverage
        working-directory: backend
        run: coverage report --include='app/main.py' --precision=2 --fail-under=90

      - name: S3-compatible artifact adapter coverage
        working-directory: backend
        run: coverage report --include='app/adapters/artifacts/s3_compatible.py' --precision=2 --fail-under=90

      - name: S3 namespace validation coverage
        working-directory: backend
        run: coverage report --include='app/core/s3_validation.py' --precision=2 --fail-under=90

      - name: Audit subsystem coverage
        working-directory: backend
        run: coverage report --include='app/modules/audit/*' --precision=2 --fail-under=90

      - name: Actor subsystem coverage
        working-directory: backend
        run: coverage report --include='app/modules/actors/*' --precision=2 --fail-under=90

      - name: Authorization subsystem coverage
        working-directory: backend
        run: coverage report --include='app/modules/authorization/*' --precision=2 --fail-under=90

      - name: Task subsystem coverage
        working-directory: backend
        run: coverage report --include='app/modules/tasks/*' --precision=2 --fail-under=90

      - name: Auth verifier boundary coverage
        working-directory: backend
        run: >-
          coverage report
          --include='app/interfaces/auth.py,app/core/auth.py,app/adapters/auth/dev.py,app/adapters/auth/flow.py'
          --precision=2
          --fail-under=90
