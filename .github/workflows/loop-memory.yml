name: Loop Memory

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - loop-memory-replay

permissions:
  checks: read
  contents: write
  pull-requests: read
  statuses: read

concurrency:
  group: workstream-loop-memory
  cancel-in-progress: false

jobs:
  loop-memory:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      MERGE_SHA: ${{ github.event_name == 'push' && github.sha || github.event.client_payload.merge_sha }}
      STATE_BRANCH: automation/loop-memory

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Prepare generated state branch
        id: state
        shell: bash
        env:
          LOOP_MEMORY_SIGNING_KEY: ${{ secrets.LOOP_MEMORY_SIGNING_KEY }}
        run: |
          set -euo pipefail
          gh auth setup-git
          private_key="${RUNNER_TEMP}/loop-memory-signing-key.pem"
          printf '%s\n' "${LOOP_MEMORY_SIGNING_KEY}" > "${private_key}"
          chmod 600 "${private_key}"
          echo "LOOP_MEMORY_PRIVATE_KEY=${private_key}" >> "${GITHUB_ENV}"
          state_dir="${RUNNER_TEMP}/loop-memory-state"
          if git ls-remote --exit-code --heads origin "refs/heads/${STATE_BRANCH}" >/dev/null; then
            git clone --depth 1 --single-branch --branch "${STATE_BRANCH}" \
              "https://github.com/${GITHUB_REPOSITORY}.git" "${state_dir}"
          else
            mkdir -p "${state_dir}"
            git -C "${state_dir}" init --initial-branch "${STATE_BRANCH}"
            git -C "${state_dir}" remote add origin \
              "https://github.com/${GITHUB_REPOSITORY}.git"
          fi
          if [[ -f "${state_dir}/.agent-loop/STATE.json" ||
                -f "${state_dir}/.agent-loop/MERGE_LOG.jsonl" ||
                -f "${state_dir}/.agent-loop/STATE.sig" ]]; then
            if ! python3 scripts/update_post_merge_memory.py verify-state \
              --state-root "${state_dir}" \
              --public-key .agent-loop/keys/loop-memory-signing-public.pem; then
              echo "Discarding unauthenticated generated state and rebuilding."
              rm -f \
                "${state_dir}/.agent-loop/STATE.json" \
                "${state_dir}/.agent-loop/LOOP_STATE.md" \
                "${state_dir}/.agent-loop/MERGE_LOG.jsonl" \
                "${state_dir}/.agent-loop/STATE.sig"
            fi
          fi
          echo "state_dir=${state_dir}" >> "${GITHUB_OUTPUT}"

      - name: Reconcile every unrecorded main commit
        shell: bash
        run: |
          set -euo pipefail
          state_dir="${{ steps.state.outputs.state_dir }}"
          if [[ ! "${MERGE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid merge SHA." >&2
            exit 1
          fi
          current_sha=""
          if [[ -f "${state_dir}/.agent-loop/STATE.json" ]]; then
            current_sha=$(python3 -c \
              'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["source"]["main_sha"])' \
              "${state_dir}/.agent-loop/STATE.json")
          fi
          plan_file=$(mktemp)
          plan_args=(
            plan-commits
            --repository-root .
            --target-sha "${MERGE_SHA}"
          )
          if [[ -n "${current_sha}" ]]; then
            plan_args+=(--current-sha "${current_sha}")
          fi
          python3 scripts/update_post_merge_memory.py "${plan_args[@]}" > "${plan_file}"
          mapfile -t merge_shas < "${plan_file}"
          for merge_sha in "${merge_shas[@]}"; do
            python3 scripts/update_post_merge_memory.py update \
              --repository "${GITHUB_REPOSITORY}" \
              --merge-sha "${merge_sha}" \
              --state-root "${state_dir}"
          done

      - name: Validate generated state
        shell: bash
        run: |
          set -euo pipefail
          state_dir="${{ steps.state.outputs.state_dir }}"
          python3 scripts/update_post_merge_memory.py sign-state \
            --state-root "${state_dir}" \
            --private-key "${LOOP_MEMORY_PRIVATE_KEY}"
          python3 scripts/update_post_merge_memory.py verify-state \
            --state-root "${state_dir}" \
            --public-key .agent-loop/keys/loop-memory-signing-public.pem \
            --expected-main-sha "${MERGE_SHA}"

      - name: Commit generated state branch
        shell: bash
        run: |
          set -euo pipefail
          state_dir="${{ steps.state.outputs.state_dir }}"
          git -C "${state_dir}" add \
            .agent-loop/STATE.json \
            .agent-loop/LOOP_STATE.md \
            .agent-loop/MERGE_LOG.jsonl \
            .agent-loop/STATE.sig
          if git -C "${state_dir}" diff --cached --quiet; then
            echo "Loop memory is already current."
            exit 0
          fi
          pr_number=$(python3 -c \
            'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["source"]["pr_number"])' \
            "${state_dir}/.agent-loop/STATE.json")
          git -C "${state_dir}" config user.name "workstream-loop-memory[bot]"
          git -C "${state_dir}" config user.email \
            "workstream-loop-memory[bot]@users.noreply.github.com"
          git -C "${state_dir}" commit -m "chore(loop-memory): record PR #${pr_number}"
          git -C "${state_dir}" push origin "HEAD:refs/heads/${STATE_BRANCH}"
